server {
    listen 80;
    server_name _;

    # Docker internal DNS for lazy resolution at request time (not startup)
    resolver 127.0.0.11 valid=10s ipv6=off;

    auth_basic           "F5-TTS Engine";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Dashboard SPA
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Management API  (/mgmt/status → mgmt:9000/status)
    location /mgmt/ {
        set $mgmt http://f5tts-mgmt:9000;
        rewrite ^/mgmt/(.*)$ /$1 break;
        proxy_pass         $mgmt;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30;
    }

    # TTS API  (/api/voice/tts → api:8301/voice/tts)
    location /api/ {
        set $api http://f5tts-api:8301;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         $api;
        proxy_set_header   Host $host;
        proxy_read_timeout 300;
    }

    # Gradio Inference  (/infer/... → infer:7860/...)
    location /infer/ {
        set $infer http://f5tts-infer:7860;
        rewrite ^/infer/(.*)$ /$1 break;
        proxy_pass             $infer;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_read_timeout     3600;
        proxy_hide_header      X-Frame-Options;
        add_header             X-Frame-Options "";
        proxy_hide_header      Content-Security-Policy;
    }

    # Gradio Fine-tune  (/train/... → train:7861/...)
    location /train/ {
        set $train http://f5tts-train:7861;
        rewrite ^/train/(.*)$ /$1 break;
        proxy_pass             $train;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_read_timeout     3600;
        proxy_hide_header      X-Frame-Options;
        add_header             X-Frame-Options "";
        proxy_hide_header      Content-Security-Policy;
    }

    # TensorBoard  (/tensorboard/... → tb:6006/tensorboard/... — prefix kept, TB serves at it)
    location /tensorboard/ {
        set $tb http://f5tts-tensorboard:6006;
        proxy_pass             $tb;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_read_timeout     3600;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
