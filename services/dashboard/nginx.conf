server {
    listen 80;
    server_name _;

    auth_basic           "F5-TTS Engine";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Dashboard SPA
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Management API
    location /mgmt/ {
        proxy_pass         http://f5tts-mgmt:9000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30;
    }

    # TTS API — also exposed directly on port 8301
    location /api/ {
        proxy_pass       http://f5tts-api:8301/;
        proxy_set_header Host $host;
        proxy_read_timeout 300;
    }

    # Gradio Inference
    location /infer/ {
        proxy_pass             http://f5tts-infer:7860/;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_read_timeout     3600;
        proxy_hide_header      X-Frame-Options;
        add_header             X-Frame-Options "";
        proxy_hide_header      Content-Security-Policy;
    }

    # Gradio Fine-tune
    location /train/ {
        proxy_pass             http://f5tts-train:7861/;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_read_timeout     3600;
        proxy_hide_header      X-Frame-Options;
        add_header             X-Frame-Options "";
        proxy_hide_header      Content-Security-Policy;
    }

    # TensorBoard
    location /tensorboard/ {
        proxy_pass         http://f5tts-tensorboard:6006/tensorboard/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
