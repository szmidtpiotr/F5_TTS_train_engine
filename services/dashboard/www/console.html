<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>F5-TTS API Console</title>
<style>
:root{--bg:#15171c;--panel:#1e2129;--edge:#2c313c;--txt:#e7e9ee;--mut:#9aa3b2;--acc:#f5a623;--ok:#3ecf8e;--err:#ff6b6b;--warn:#f5a623}
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.5 system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:16px}
h1{font-size:15px;margin-bottom:16px;color:var(--acc)}
.card{background:var(--panel);border:1px solid var(--edge);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.card-title{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
label{display:block;font-size:11px;color:var(--mut);margin:8px 0 3px}
label .val{float:right;color:var(--acc)}
textarea{width:100%;background:#0d0f13;color:var(--txt);border:1px solid var(--edge);border-radius:8px;padding:9px;font:inherit;resize:vertical;min-height:100px}
input[type=range]{width:100%;accent-color:var(--acc)}
input[type=number],input[type=text]{background:#0d0f13;color:var(--txt);border:1px solid var(--edge);border-radius:6px;padding:5px 9px;font:inherit}
input[type=number]{width:80px;text-align:center}
input[type=text]{width:100%}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.pdesc{font-size:11px;color:#4e5a72;margin-top:3px;line-height:1.4}
button{background:var(--acc);color:#000;border:0;border-radius:8px;padding:8px 18px;font:inherit;font-weight:700;cursor:pointer}
button:disabled{opacity:.4;cursor:not-allowed}
button.sec{background:#2c313c;color:var(--txt);font-weight:400}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
audio{width:100%;margin-top:8px;border-radius:6px}
.status{font-size:12px;color:var(--mut);margin-top:6px;min-height:16px}
.status b{color:var(--ok)}
.status.err{color:var(--err)}
.bar-wrap{height:3px;background:var(--edge);border-radius:2px;margin-top:8px;overflow:hidden;display:none}
.bar{height:100%;background:var(--acc);animation:sl 1.4s ease-in-out infinite}
@keyframes sl{0%{width:0;margin-left:0}50%{width:55%;margin-left:22%}100%{width:0;margin-left:100%}}
.logbox{background:#0a0c10;border:1px solid var(--edge);border-radius:8px;height:180px;overflow-y:auto;padding:9px;font:12px/1.7 monospace;color:#5a6480}
.logbox .ok{color:var(--ok)}.logbox .err{color:var(--err)}.logbox .warn{color:var(--warn)}
#health-badge{font-size:12px;padding:2px 10px;border-radius:20px;background:#1a3a1a;color:var(--ok)}
</style>
</head>
<body>

<h1>🔌 F5-TTS API Console</h1>

<div class="card">
  <div class="card-title">Endpoint</div>
  <label>API URL <span id="health-badge">checking…</span></label>
  <input type="text" id="api-url" value="/api"/>
  <div class="pdesc">Use <code>/api</code> (via dashboard proxy) or direct <code>http://HOST:8301</code></div>
</div>

<div class="card">
  <div class="card-title">📝 Text</div>
  <textarea id="text">Witaj! To jest test syntezy mowy.</textarea>
</div>

<div class="card">
  <div class="card-title">⚙️ Parameters</div>
  <div class="grid">
    <div>
      <label>NFE Steps <span class="val" id="nfeV">32</span></label>
      <input type="range" id="nfe" min="4" max="64" step="4" value="32"/>
      <div class="pdesc">16 = faster · 32 = default · 64 = best</div>
    </div>
    <div>
      <label>Speed <span class="val" id="speedV">1.00×</span></label>
      <input type="range" id="speed" min="0.5" max="2.0" step="0.05" value="1.0"/>
    </div>
    <div>
      <label>CFG Strength <span class="val" id="cfgV">2.0</span></label>
      <input type="range" id="cfg" min="0" max="5" step="0.1" value="2.0"/>
    </div>
    <div>
      <label>Cross-fade <span class="val" id="xfadeV">0.15s</span></label>
      <input type="range" id="xfade" min="0" max="0.5" step="0.01" value="0.15"/>
    </div>
    <div>
      <label>Seed</label>
      <input type="number" id="seed" value="-1" min="-1"/>
      <div class="pdesc">-1 = random</div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title">🔊 Generate</div>
  <div class="bar-wrap" id="bar"><div class="bar"></div></div>
  <div class="row">
    <button id="synth">▶ Synthesize</button>
    <a id="dl" style="display:none;padding:8px 14px;border-radius:8px;text-decoration:none;border:1px solid var(--edge);color:var(--txt);font-size:13px" download="tts.wav">⬇ Download</a>
  </div>
  <audio id="player" controls style="display:none"></audio>
  <div class="status" id="status"></div>
</div>

<div class="card">
  <div class="card-title" style="display:flex;justify-content:space-between">
    📋 Service Logs
    <button class="sec" style="padding:3px 10px;font-size:11px" onclick="fetchLogs()">↺ Refresh</button>
  </div>
  <div class="logbox" id="logbox"><div style="color:#2e3a4e">Click Refresh or generate something…</div></div>
</div>

<script>
function sl(id,vid,fmt){
  const e=document.getElementById(id),v=document.getElementById(vid);
  v.textContent=fmt(e.value);
  e.addEventListener('input',()=>v.textContent=fmt(e.value));
}
sl('nfe','nfeV',v=>parseInt(v));
sl('speed','speedV',v=>parseFloat(v).toFixed(2)+'×');
sl('cfg','cfgV',v=>parseFloat(v).toFixed(1));
sl('xfade','xfadeV',v=>parseFloat(v).toFixed(2)+'s');

function apiUrl(){ return document.getElementById('api-url').value.replace(/\/$/,''); }

function checkHealth(){
  fetch(apiUrl()+'/voice/healthz',{signal:AbortSignal.timeout(4000)})
    .then(r=>r.json())
    .then(d=>{
      const b=document.getElementById('health-badge');
      b.textContent=d.tts_loaded?'● online':'● loading…';
      b.style.background=d.tts_loaded?'#1a3a1a':'#3a2a10';
      b.style.color=d.tts_loaded?'var(--ok)':'var(--warn)';
    }).catch(()=>{
      const b=document.getElementById('health-badge');
      b.textContent='✕ unreachable'; b.style.background='#3a1010'; b.style.color='var(--err)';
    });
}
checkHealth(); setInterval(checkHealth,10000);
document.getElementById('api-url').addEventListener('change',checkHealth);

async function fetchLogs(){
  try{
    const r=await fetch(apiUrl()+'/voice/logs');
    const d=await r.json();
    const box=document.getElementById('logbox');
    if(!d.logs||!d.logs.length){box.innerHTML='<div style="color:#2e3a4e">No logs yet.</div>';return;}
    box.innerHTML=d.logs.map(line=>{
      let c='';
      if(/ERROR|BŁĄD/i.test(line)) c='err';
      else if(/Done|Loaded|Complete/i.test(line)) c='ok';
      else if(/Generating|Loading/i.test(line)) c='warn';
      return `<div class="${c}">${line.replace(/</g,'&lt;')}</div>`;
    }).join('');
    box.scrollTop=box.scrollHeight;
  }catch(e){}
}

document.getElementById('synth').addEventListener('click',async()=>{
  const text=document.getElementById('text').value.trim();
  if(!text)return;
  const btn=document.getElementById('synth');
  const status=document.getElementById('status');
  const bar=document.getElementById('bar');
  const player=document.getElementById('player');
  const dl=document.getElementById('dl');

  btn.disabled=true; btn.textContent='⏳ Generating…';
  status.className='status'; status.textContent='Sending…';
  bar.style.display='block'; player.style.display='none'; dl.style.display='none';
  const t0=Date.now();

  try{
    const params={
      text,
      speed:document.getElementById('speed').value,
      nfe_step:document.getElementById('nfe').value,
      cfg_strength:document.getElementById('cfg').value,
      cross_fade_duration:document.getElementById('xfade').value,
      seed:document.getElementById('seed').value,
    };
    const res=await fetch(apiUrl()+'/voice/tts?'+new URLSearchParams(params));
    if(!res.ok) throw new Error('HTTP '+res.status);
    const blob=await res.blob();
    const url=URL.createObjectURL(new Blob([blob],{type:'audio/wav'}));
    const np=document.createElement('audio');
    np.id='player'; np.controls=true; np.style.cssText='width:100%;margin-top:8px;border-radius:6px;display:block';
    player.parentNode.replaceChild(np,player);
    np.src=url; np.load();
    np.oncanplay=()=>np.play().catch(()=>{});
    dl.href=url; dl.style.display='';
    status.innerHTML=`<b>✓ Done</b> — ${((Date.now()-t0)/1000).toFixed(1)}s | ${(blob.size/1024).toFixed(0)} KB`;
    fetchLogs();
  }catch(e){
    status.className='status err'; status.textContent='Error: '+e.message;
  }finally{
    btn.disabled=false; btn.textContent='▶ Synthesize';
    bar.style.display='none';
  }
});
</script>
</body>
</html>
